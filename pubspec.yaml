name: flutter_application_1
description: "Restaurant POS with offline-first LAN communication."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.7.0

dependencies:
  flutter:
    sdk: flutter

  # ── State management ───────────────────────────────────────────────────────
  flutter_riverpod: ^2.5.1

  # ── Backend ────────────────────────────────────────────────────────────────
  supabase_flutter: ^2.5.6

  # ── UI ────────────────────────────────────────────────────────────────────
  cupertino_icons: ^1.0.8

  # ── Utilities ─────────────────────────────────────────────────────────────
  crypto: ^3.0.3
  intl: ^0.19.0
  uuid: ^4.4.2
  path: ^1.9.0

  # ── Offline / local DB ─────────────────────────────────────────────────────
  sqflite: ^2.3.3
  sqflite_common_ffi: ^2.0.0
  connectivity_plus: ^6.0.5
  shared_preferences: ^2.2.3   # kept higher version, removed duplicate

  # ── LAN server ─────────────────────────────────────────────────────────────
  shelf: ^1.4.1
  shelf_router: ^1.1.4
  shelf_web_socket: ^2.0.0

  # ── LAN client ─────────────────────────────────────────────────────────────
  http: ^1.2.1
  web_socket_channel: ^3.0.0

  # ── IP discovery ───────────────────────────────────────────────────────────
  network_info_plus: ^6.0.0
  qr_flutter: ^4.1.0
  mobile_scanner: ^5.2.3
  
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
