name: flutter_application_1
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter

  flutter_riverpod: ^2.5.1
  supabase_flutter: ^2.5.6
  cupertino_icons: ^1.0.8
  crypto: ^3.0.3

  shelf: ^1.4.1
  shelf_router: ^1.1.4
  network_info_plus: ^6.0.0
  intl: ^0.19.0
  

  # ── Offline support ────────────────────────────────────────────────────────
  sqflite: ^2.3.3          # Local SQLite database (cache + sync queue)
  path: ^1.9.0             # getDatabasesPath() helper for sqflite
  connectivity_plus: ^6.0.5 # Network interface change detection
  uuid: ^4.4.2             # Generates offline order IDs
  sqflite_common_ffi: ^2.0.0 # FFI implementation for sqflite (desktop/web)
  # ──────────────────────────────────────────────────────────────────────────

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  

flutter:
  uses-material-design: true